<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NAGS Ghana — Chapter Network</title>
  <meta name="description" content="National Association of Gonjaland Students — Ghana Chapter Network. Select your university to register or access your chapter portal.">
  
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="nags.png">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* ── Platform Landing Specific Styles ── */
    .platform-main {
      background: linear-gradient(160deg, #1a3f72 0%, #0d2444 60%, #081830 100%);
      min-height: calc(100vh - 120px);
      padding: 32px 20px 48px;
    }
    .platform-section-label {
      text-align: center;
      color: rgba(255,255,255,0.55);
      font-family: var(--ui-font, 'Segoe UI', sans-serif);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      margin-bottom: 24px;
    }
    .chapters-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      max-width: 1100px;
      margin: 0 auto;
    }
    .chapter-card {
      background: #ffffff;
      border-radius: 10px;
      border: 1px solid #e6eaf0;
      border-top: 3px solid #1a3f72;
      padding: 24px 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: box-shadow 0.25s ease, transform 0.2s ease;
      cursor: default;
    }
    .chapter-card:hover {
      box-shadow: 0 12px 32px rgba(0,0,0,0.18);
      transform: translateY(-2px);
    }
    .chapter-card-header {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .chapter-logo-wrap {
      width: 54px;
      height: 54px;
      flex-shrink: 0;
      border-radius: 50%;
      overflow: hidden;
      background: #f0f4fb;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .chapter-logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .chapter-logo-initials {
      font-size: 18px;
      font-weight: 800;
      color: #1a3f72;
      font-family: var(--ui-font, 'Segoe UI', sans-serif);
      letter-spacing: -0.5px;
    }
    .chapter-name {
      font-size: 14px;
      font-weight: 700;
      color: #1a1a2e;
      line-height: 1.35;
      font-family: var(--body-font, Georgia, serif);
    }
    .chapter-badge {
      display: inline-block;
      background: #1a3f72;
      color: white;
      font-size: 9px;
      font-family: var(--ui-font, 'Segoe UI', sans-serif);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 2px 9px;
      border-radius: 20px;
      margin-top: 3px;
    }
    .chapter-location {
      font-size: 11px;
      color: #777;
      font-family: var(--ui-font, 'Segoe UI', sans-serif);
    }
    .chapter-actions {
      display: flex;
      gap: 8px;
      flex-direction: column;
    }
    .chapter-actions a {
      display: block;
      text-align: center;
      text-decoration: none;
      padding: 9px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      font-family: var(--ui-font, 'Segoe UI', sans-serif);
      transition: opacity 0.2s ease;
      cursor: pointer;
    }
    .chapter-actions a:hover { opacity: 0.85; }
    .chapter-btn-register {
      background: #1a3f72;
      color: white;
    }
    .chapter-btn-login {
      background: transparent;
      color: #1a3f72;
      border: 1.5px solid #1a3f72;
    }

    /* Loading skeleton */
    .skeleton-card {
      background: rgba(255,255,255,0.07);
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 24px 22px;
      height: 220px;
      animation: skeleton-pulse 1.5s ease-in-out infinite;
    }
    @keyframes skeleton-pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    .platform-empty {
      text-align: center;
      padding: 60px 20px;
      color: rgba(255,255,255,0.6);
      font-family: var(--ui-font, 'Segoe UI', sans-serif);
      max-width: 420px;
      margin: 0 auto;
    }
    .platform-empty-icon { font-size: 42px; margin-bottom: 16px; }
    .platform-empty-title { font-size: 16px; font-weight: 600; color: rgba(255,255,255,0.85); margin-bottom: 8px; }
    .platform-empty-sub { font-size: 12px; line-height: 1.7; }

    @media (max-width: 520px) {
      .chapters-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Platform Header -->
  <header class="top-bar">
    <div class="top-bar-content" style="justify-content: center;">
      <div style="display: flex; flex-direction: column; align-items: center; gap: 4px; text-align: center;">
        <div class="logo-box" style="border: none; padding: 0; margin-bottom: 4px;">
          <img src="nags.png" alt="NAGS Ghana Logo" style="width: 50px; height: 50px; object-fit: contain;">
        </div>
        <h1 class="header-title">National Association of Gonjaland Students</h1>
        <div class="header-subtitle">Ghana Chapter Network</div>
        <div class="header-motto">Select your university to register or access your chapter portal</div>
      </div>
    </div>
  </header>

  <!-- Main Platform Body -->
  <main class="platform-main">
    <p class="platform-section-label">Active Chapters</p>

    <!-- Loading skeletons shown initially -->
    <div id="chapters-container" class="chapters-grid">
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
    </div>
  </main>

  <!-- Platform Footer -->
  <footer>
    <div>&copy; 2026 National Association of Gonjaland Students, Ghana. All rights reserved. Developed by Q-Nova GH</div>
  </footer>

  <script src="config.js?v=36"></script>
  <script>
    let supabaseClient;

    async function loadChapters() {
      const container = document.getElementById('chapters-container');

      try {
        if (!window.supabase || !CONFIG || !CONFIG.SUPABASE_URL) {
          throw new Error('config_missing');
        }

        supabaseClient = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

        const { data, error } = await supabaseClient
          .from('universities')
          .select('id, name, short_name, slug, location, logo_url')
          .eq('is_active', true)
          .order('name', { ascending: true });

        if (error) {
          // Table may not exist yet (Phase 2 not yet run) — show UENR fallback
          if (error.code === '42P01' || error.message.includes('does not exist')) {
            renderFallback(container);
            return;
          }
          throw error;
        }

        if (!data || data.length === 0) {
          container.outerHTML = `
            <div class="platform-empty">
              <div class="platform-empty-icon">🏛️</div>
              <div class="platform-empty-title">No chapters registered yet</div>
              <div class="platform-empty-sub">Chapters will appear here once added by the platform administrator.</div>
            </div>`;
          return;
        }

        renderChapters(container, data);

      } catch (err) {
        console.warn('Chapter load error:', err);
        renderFallback(container);
      }
    }

    function renderChapters(container, chapters) {
      container.innerHTML = '';
      chapters.forEach(ch => {
        const logoContent = ch.logo_url
          ? `<img src="${escapeAttr(ch.logo_url)}" alt="${escapeAttr(ch.short_name)} Logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
             <div class="chapter-logo-initials" style="display:none;">${ch.short_name.substring(0,2).toUpperCase()}</div>`
          : `<div class="chapter-logo-initials">${ch.short_name.substring(0,2).toUpperCase()}</div>`;

        const card = document.createElement('div');
        card.className = 'chapter-card';
        card.innerHTML = `
          <div class="chapter-card-header">
            <div class="chapter-logo-wrap">${logoContent}</div>
            <div>
              <div class="chapter-name">${escapeHTML(ch.name)}</div>
              <div class="chapter-badge">${escapeHTML(ch.short_name)}</div>
            </div>
          </div>
          ${ch.location ? `<div class="chapter-location">&#128205; ${escapeHTML(ch.location)}</div>` : ''}
          <div class="chapter-actions">
            <a href="/register/?chapter=${encodeURIComponent(ch.slug)}" class="chapter-btn-register">Register as Member &rarr;</a>
            <a href="/login.html?chapter=${encodeURIComponent(ch.slug)}" class="chapter-btn-login">Executive Login</a>
          </div>`;
        container.appendChild(card);
      });
    }

    function renderFallback(container) {
      // Show UENR as a static fallback when the universities table does not exist yet
      container.innerHTML = `
        <div class="chapter-card">
          <div class="chapter-card-header">
            <div class="chapter-logo-wrap"><img src="nags.png" alt="NAGS-UENR Logo"></div>
            <div>
              <div class="chapter-name">University of Energy and Natural Resources</div>
              <div class="chapter-badge">UENR</div>
            </div>
          </div>
          <div class="chapter-location">&#128205; Sunyani, Bono Region, Ghana</div>
          <div class="chapter-actions">
            <a href="/register/?chapter=uenr" class="chapter-btn-register">Register as Member &rarr;</a>
            <a href="/login.html?chapter=uenr" class="chapter-btn-login">Executive Login</a>
          </div>
        </div>`;
    }

    function escapeHTML(str) {
      if (!str) return '';
      return str.replace(/[&<>"']/g, t => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[t]||t));
    }
    function escapeAttr(str) { return escapeHTML(String(str || '')); }

    document.addEventListener('DOMContentLoaded', loadChapters);
  </script>

</body>
</html>
